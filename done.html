<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="robots" content="noindex">
  <title>LightSaber Complete</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f7fb;
      --card: #ffffff;
      --ink: #111827;
      --muted: #5b6472;
      --accent: #1769e0;
      --ok: #0f7a3d;
      --border: rgba(17,24,39,0.1);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding: max(24px, env(safe-area-inset-top)) 18px max(24px, env(safe-area-inset-bottom));
      background:
        radial-gradient(900px 540px at 50% -160px, rgba(23,105,224,0.18), transparent 62%),
        var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", system-ui, sans-serif;
    }
    main {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: 0 22px 60px rgba(15,23,42,0.14);
      padding: 26px 22px;
      text-align: center;
    }
    .mark {
      width: 46px;
      height: 46px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      margin: 0 auto 16px;
      background: rgba(15,122,61,0.12);
      color: var(--ok);
      font-size: 1.45rem;
      font-weight: 800;
    }
    h1 {
      font-size: 1.38rem;
      line-height: 1.15;
      letter-spacing: 0;
      margin-bottom: 10px;
    }
    p {
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.55;
    }
    .note {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
      font-size: 0.82rem;
    }
    a {
      color: var(--accent);
      font-weight: 700;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main>
    <div class="mark">✓</div>
    <h1>LightSaber Finished</h1>
    <p>The chain completed and Safari was relaunched into this fresh completion page.</p>
    <p class="note">Selected post-exploit steps have already run. For another attempt, force-quit Safari first for the cleanest userland state.</p>
    <p class="note"><a href="./">Back to LightSaber</a></p>
  </main>
</body>
</html>
